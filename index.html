#game{flex-direction:column;padding:10px 8px 20px}.header{width:min(100%,1050px);margin:0 auto 10px;display:flex;justify-content:space-between;align-items:center}.mini{color:#fff;font:700 1.35rem Fredoka}.header-actions{display:flex;gap:7px}.icon-btn{width:46px;height:46px;border-radius:15px;background:#ffffff2e;color:#fff;border:1px solid #ffffff47;font-size:1.1rem}.layout{width:min(100%,1050px);margin:auto;display:grid;gap:12px}.panel{background:#fffffff7;border-radius:25px;box-shadow:var(--sh)}.board-panel{padding:10px}.status{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:9px}.stat{padding:7px 3px;border-radius:13px;text-align:center;background:var(--soft)}.stat small{display:block;color:var(--mut);font-size:.6rem;font-weight:900;text-transform:uppercase}.stat strong{display:block;color:var(--pd);font:700 .9rem Fredoka}.board{width:100%;max-width:620px;margin:auto;aspect-ratio:1;display:grid;grid-template-columns:repeat(9,1fr);grid-template-rows:repeat(9,1fr);border:3px solid var(--ink);border-radius:11px;overflow:hidden;background:#fff;transition:.25s}.board.blurred{filter:blur(8px);opacity:.35;pointer-events:none}.cell{display:grid;place-items:center;min-width:0;min-height:0;padding:0;border:0;border-right:1px solid var(--line);border-bottom:1px solid var(--line);border-radius:0;background:#fff;color:var(--b);font:600 clamp(1rem,5.2vw,2rem)/1 Fredoka}.cell:nth-child(9n){border-right:0}.cell:nth-child(n+73){border-bottom:0}.cell.br{border-right:3px solid var(--ink)}.cell.bb{border-bottom:3px solid var(--ink)}.cell.given{background:#fafbff;color:var(--ink);font-weight:700}.cell.related{background:#f0f2ff}.cell.same{background:#dfe2ff;color:var(--pd)}.cell.selected{background:#fff4b8;box-shadow:inset 0 0 0 3px var(--y);z-index:2}.cell.wrong{color:var(--r);background:#ffe8ec}.pop{animation:pop .25s}.shake{animation:shake .34s}.glow{animation:glow .9s}@keyframes pop{50%{transform:scale(1.18)}}@keyframes shake{20%,60%{transform:translateX(-5px)}40%,80%{transform:translateX(5px)}}@keyframes glow{50%{box-shadow:inset 0 0 0 5px #55dfbde6,0 0 22px #55dfbdcc}}
.controls{padding:13px}.controls h2{margin:0 0 9px;font:700 1.1rem Fredoka}.pad{display:grid;grid-template-columns:repeat(5,1fr);gap:7px}.num{min-height:48px;border-radius:14px;background:#f0f2ff;color:var(--pd);font:700 1.25rem Fredoka}.erase{background:#ffe9ed;color:#d63c55;font-size:.75rem}.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}.actions .btn{padding:10px 7px;font-size:.8rem}.hint-status{margin-top:10px;padding:9px;border-radius:13px;text-align:center;background:#fff8d8;color:#6c5600;font-weight:900}
.overlay{position:fixed;inset:0;z-index:1000;display:none;align-items:center;justify-content:center;padding:18px;background:#17193a94;backdrop-filter:blur(7px)}.overlay.show{display:flex}.modal{width:min(100%,430px);background:#fff;border-radius:27px;padding:24px 20px;text-align:center;box-shadow:0 28px 70px #14144659;animation:modal .3s}.emoji{width:70px;height:70px;margin:0 auto 12px;display:grid;place-items:center;border-radius:22px;background:#f0f1ff;font-size:2rem}.modal h2{margin:0 0 8px;font:700 1.75rem Fredoka;color:var(--pd)}.modal p{color:var(--mut);line-height:1.5}.modal-actions{display:grid;gap:9px;margin-top:15px}.player-input{width:100%;min-height:52px;border:2px solid #e2e5f4;border-radius:15px;padding:0 15px;font-size:16px}.win-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px}.win-stat{padding:10px;border-radius:13px;background:var(--soft)}.win-stat small{display:block;color:var(--mut)}.win-stat strong{color:var(--pd);font-family:Fredoka}@keyframes modal{from{opacity:0;transform:scale(.88) translateY(15px)}}
.loading{position:fixed;inset:0;z-index:1500;display:none;align-items:center;justify-content:center;background:#3d39bfdc}.loading.show{display:flex}.load-card{background:#fff;border-radius:24px;padding:25px;text-align:center;font:600 1rem Fredoka;color:var(--pd)}.spinner{font-size:2.5rem;animation:spin 1s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.toast{position:fixed;z-index:2000;left:50%;bottom:22px;width:min(calc(100% - 30px),420px);transform:translate(-50%,30px);padding:13px 16px;border-radius:15px;background:var(--ink);color:#fff;text-align:center;font-weight:800;opacity:0;pointer-events:none;transition:.25s}.toast.show{opacity:1;transform:translate(-50%,0)}.confetti{position:fixed;z-index:1800;top:-20px;width:10px;height:16px;border-radius:3px;pointer-events:none;animation:fall linear forwards}@keyframes fall{to{transform:translate3d(var(--d),110vh,0) rotate(900deg);opacity:.8}}
@media(min-width:700px){.levels{grid-template-columns:repeat(3,1fr)}.level{text-align:center}.level-row{flex-direction:column}.board-panel{padding:18px}.controls{padding:18px}}

<script>
"use strict";
const HOME_URL="index.html";
const firebaseConfig={apiKey:"AIzaSyDNS_9Fs0WHxUylbNEnA3FjPrm6kDWgEvg",authDomain:"fractionpizza-698b2.firebaseapp.com",databaseURL:"https://fractionpizza-698b2-default-rtdb.asia-southeast1.firebasedatabase.app",projectId:"fractionpizza-698b2",storageBucket:"fractionpizza-698b2.firebasestorage.app",messagingSenderId:"642105769062",appId:"1:642105769062:web:4a83a3b6d9a85a959301a7"};
let db=null,fb=false;try{if(window.firebase){if(!firebase.apps.length)firebase.initializeApp(firebaseConfig);db=firebase.database();fb=true}}catch(e){console.warn(e)}
const $=id=>document.getElementById(id),home=$("home"),game=$("game"),board=$("board"),overlay=$("overlay"),loading=$("loading");
const labels={easy:"MUDAH",medium:"SEDERHANA",hard:"SUSAH"},ranges={easy:[40,45],medium:[32,39],hard:[24,31]},KEY="fmSudokuGame",NAME="fmSudokuName",PID="fmSudokuPid",SOUND="fmSudokuSound";
let state=blank(),tick=null,selectedPending=null,audio=null,soundOn=localStorage.getItem(SOUND)!=="off";
function blank(){return{puzzle:[],solution:[],currentBoard:[],difficulty:"easy",selectedRow:null,selectedCol:null,elapsedSeconds:0,mistakes:0,hintsRemaining:3,hintsUsed:0,isRunning:false,isPaused:false,completed:false,sessionId:null}}
function shuffleArray(a){a=[...a];for(let i=a.length-1;i;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function empty(){return Array.from({length:9},()=>Array(9).fill(0))}
function isValidPlacement(b,r,c,n){for(let i=0;i<9;i++)if(b[r][i]===n||b[i][c]===n)return false;let sr=Math.floor(r/3)*3,sc=Math.floor(c/3)*3;for(let y=sr;y<sr+3;y++)for(let x=sc;x<sc+3;x++)if(b[y][x]===n)return false;return true}
function findEmpty(b){let best=null,min=10;for(let r=0;r<9;r++)for(let c=0;c<9;c++)if(!b[r][c]){let k=0;for(let n=1;n<=9;n++)if(isValidPlacement(b,r,c,n))k++;if(k<min){min=k;best=[r,c];if(k===1)return best}}return best}
function solveSudoku(b){let e=findEmpty(b);if(!e)return true;let[r,c]=e;for(let n=1;n<=9;n++)if(isValidPlacement(b,r,c,n)){b[r][c]=n;if(solveSudoku(b))return true;b[r][c]=0}return false}
function generateSolvedBoard(){let b=empty();function fill(){let e=findEmpty(b);if(!e)return true;let[r,c]=e;for(let n of shuffleArray([1,2,3,4,5,6,7,8,9]))if(isValidPlacement(b,r,c,n)){b[r][c]=n;if(fill())return true;b[r][c]=0}return false}fill();return b}
function countSolutions(b,limit=2){let count=0;function go(){if(count>=limit)return;let e=findEmpty(b);if(!e){count++;return}let[r,c]=e;for(let n=1;n<=9;n++)if(isValidPlacement(b,r,c,n)){b[r][c]=n;go();b[r][c]=0;if(count>=limit)return}}go();return count}
function removeNumbersBasedOnDifficulty(sol,d){let p=sol.map(r=>[...r]),rg=ranges[d],giv=Math.floor(Math.random()*(rg[1]-rg[0]+1))+rg[0],target=81-giv,pos=shuffleArray([...Array(81).keys()]),removed=0;for(let q of pos){if(removed>=target)break;let r=Math.floor(q/9),c=q%9,bak=p[r][c];p[r][c]=0;if(countSolutions(p.map(x=>[...x]),2)===1)removed++;else p[r][c]=bak}return p}
function generatePuzzle(d){let solution=generateSolvedBoard();return{solution,puzzle:removeNumbersBasedOnDifficulty(solution,d)}}
function showScreen(s){home.classList.remove("active");game.classList.remove("active");$(s).classList.add("active")}
function renderBoard(){board.innerHTML="";for(let r=0;r<9;r++)for(let c=0;c<9;c++){let el=document.createElement("button"),v=state.currentBoard[r][c];el.className="cell"+(state.puzzle[r][c]?" given":"")+(c===2||c===5?" br":"")+(r===2||r===5?" bb":"");el.dataset.r=r;el.dataset.c=c;el.textContent=v||"";el.onclick=()=>selectCell(r,c);board.appendChild(el)}highlights()}
function cell(r,c){return board.querySelector(`[data-r="${r}"][data-c="${c}"]`)}
function highlights(){board.querySelectorAll(".cell").forEach(el=>{el.classList.remove("selected","related","same");if(state.selectedRow===null)return;let r=+el.dataset.r,c=+el.dataset.c,v=state.currentBoard[state.selectedRow][state.selectedCol];if(r===state.selectedRow||c===state.selectedCol||(Math.floor(r/3)===Math.floor(state.selectedRow/3)&&Math.floor(c/3)===Math.floor(state.selectedCol/3)))el.classList.add("related");if(v&&state.currentBoard[r][c]===v)el.classList.add("same");if(r===state.selectedRow&&c===state.selectedCol)el.classList.add("selected")})}
function selectCell(r,c){if(!state.isRunning||state.isPaused)return;state.selectedRow=r;state.selectedCol=c;play("select");highlights()}
function enterNumber(n){if(!state.isRunning||state.isPaused||state.selectedRow===null)return;let r=state.selectedRow,c=state.selectedCol;if(state.puzzle[r][c])return toastMsg("Nombor asal tidak boleh diubah.");let el=cell(r,c);if(state.solution[r][c]===n){state.currentBoard[r][c]=n;el.textContent=n;el.classList.add("pop");setTimeout(()=>el.classList.remove("pop"),300);play("number");highlights();saveGame();checkCompletion()}else{state.mistakes++;ui();el.textContent=n;el.classList.add("wrong","shake");play("wrong");setTimeout(()=>{el.textContent=state.currentBoard[r][c]||"";el.classList.remove("wrong","shake")},650);saveGame();if(state.mistakes>=3)setTimeout(mistakeModal,500)}}
function eraseNumber(){if(!state.isRunning||state.isPaused||state.selectedRow===null)return;let r=state.selectedRow,c=state.selectedCol;if(state.puzzle[r][c])return toastMsg("Nombor asal tidak boleh dipadam.");state.currentBoard[r][c]=0;cell(r,c).textContent="";highlights();saveGame()}
function move(dr,dc){if(state.selectedRow===null)return selectCell(0,0);selectCell(Math.max(0,Math.min(8,state.selectedRow+dr)),Math.max(0,Math.min(8,state.selectedCol+dc)))}
function fmt(s){return String(Math.floor(s/60)).padStart(2,"0")+":"+String(s%60).padStart(2,"0")}
function ui(){$("diff").textContent=labels[state.difficulty];$("timer").textContent=fmt(state.elapsedSeconds);$("mistakes").textContent=state.mistakes+" / 3";$("hintStatus").textContent="Petunjuk: "+state.hintsRemaining;$("sound").textContent=soundOn?"🔊":"🔇"}
function startTimer(){stopTimer();state.isRunning=true;state.isPaused=false;tick=setInterval(()=>{if(state.isRunning&&!state.isPaused&&!state.completed){state.elapsedSeconds++;$("timer").textContent=fmt(state.elapsedSeconds);if(state.elapsedSeconds%5===0)saveGame()}},1000)}
function stopTimer(){clearInterval(tick);tick=null}
function useHint(){if(state.hintsRemaining<=0)return toastMsg("Petunjuk sudah habis. Kamu boleh buat!");if(state.selectedRow===null)return toastMsg("Pilih satu petak kosong dahulu.");let r=state.selectedRow,c=state.selectedCol;if(state.puzzle[r][c]||state.currentBoard[r][c])return toastMsg("Pilih satu petak kosong dahulu.");state.currentBoard[r][c]=state.solution[r][c];state.hintsRemaining--;state.hintsUsed++;let el=cell(r,c);el.textContent=state.solution[r][c];el.classList.add("glow");setTimeout(()=>el.classList.remove("glow"),1000);play("hint");ui();saveGame();checkCompletion()}
function checkCompletion(){for(let r=0;r<9;r++)for(let c=0;c<9;c++)if(state.currentBoard[r][c]!==state.solution[r][c])return false;state.completed=true;state.isRunning=false;stopTimer();saveGame();play("win");confetti();saveResult();setTimeout(winModal,450);return true}
function modal(emoji,title,text,buttons,extra=""){ $("emoji").textContent=emoji;$("modalTitle").textContent=title;$("modalText").textContent=text;$("extra").innerHTML=extra;let a=$("modalActions");a.innerHTML="";buttons.forEach(b=>{let x=document.createElement("button");x.className="btn "+b.cls;x.textContent=b.text;x.onclick=()=>{play("click");b.fn()};a.appendChild(x)});overlay.classList.add("show")}
function closeModal(){overlay.classList.remove("show");$("extra").innerHTML=""}
function pauseGame(){if(!state.isRunning||state.completed)return;state.isPaused=true;board.classList.add("blurred");saveGame();modal("⏸️","Permainan Dijeda","Tekan sambung apabila kamu sudah bersedia.",[{text:"SAMBUNG",cls:"primary",fn:()=>{closeModal();state.isPaused=false;board.classList.remove("blurred")}}])}
function mistakeModal(){state.isPaused=true;board.classList.add("blurred");modal("💪","Jangan putus asa!","Cuba lagi dan selesaikan cabaran ini.",[{text:"CUBA LAGI",cls:"primary",fn:()=>{state.mistakes=0;state.isPaused=false;board.classList.remove("blurred");ui();saveGame();closeModal()}},{text:"PERMAINAN BARU",cls:"mint",fn:()=>{closeModal();startNewGame(state.difficulty)}},{text:"LAMAN UTAMA",cls:"soft",fn:()=>{closeModal();goHome()}}])}
function winModal(){let ex=`<div class="win-stats"><div class="win-stat"><small>Tahap</small><strong>${labels[state.difficulty]}</strong></div><div class="win-stat"><small>Masa</small><strong>${fmt(state.elapsedSeconds)}</strong></div><div class="win-stat"><small>Kesalahan</small><strong>${state.mistakes}</strong></div><div class="win-stat"><small>Petunjuk Digunakan</small><strong>${state.hintsUsed}</strong></div></div>`;modal("🏆","HEBAT!","Kamu berjaya menyelesaikan Sudoku!",[{text:"MAIN LAGI",cls:"primary",fn:()=>{closeModal();startNewGame(state.difficulty)}},{text:"PILIH LEVEL",cls:"yellow",fn:()=>{closeModal();clearGame();goHome()}},{text:"LAMAN UTAMA",cls:"soft",fn:()=>location.href=HOME_URL}],ex)}
function saveGame(){if(state.puzzle.length)localStorage.setItem(KEY,JSON.stringify(state))}
function saved(){try{return JSON.parse(localStorage.getItem(KEY))}catch{return null}}
function loadGame(){let s=saved();if(!s)return toastMsg("Tiada permainan tersimpan.");state={...blank(),...s,isRunning:true,isPaused:false};showScreen("game");renderBoard();ui();board.classList.remove("blurred");startTimer();closeModal()}
function clearGame(){localStorage.removeItem(KEY);homeUI()}
function pid(){let p=localStorage.getItem(PID);if(!p){p="player_"+Date.now()+"_"+Math.random().toString(36).slice(2,8);localStorage.setItem(PID,p)}return p}
async function savePlayerFB(){if(!fb)return;try{await db.ref("sudokuPlayers/"+pid()).update({playerName:localStorage.getItem(NAME),lastPlayed:firebase.database.ServerValue.TIMESTAMP})}catch(e){console.warn(e)}}
async function saveResult(){let rec={playerId:pid(),difficulty:state.difficulty,completionTime:state.elapsedSeconds,mistakes:state.mistakes,hintsUsed:state.hintsUsed,completed:true,timestamp:Date.now()};localStorage.setItem("fmSudokuLastResult",JSON.stringify(rec));if(!fb)return;try{await db.ref("gameSessions/"+state.sessionId).set({...rec,timestamp:firebase.database.ServerValue.TIMESTAMP});let ref=db.ref("sudokuPlayers/"+pid());await ref.transaction(cur=>{let d=cur||{playerName:localStorage.getItem(NAME),gamesPlayed:0,gamesWon:0,totalMistakes:0};d.gamesWon=(d.gamesWon||0)+1;d.totalMistakes=(d.totalMistakes||0)+state.mistakes;let k={easy:"bestTimeEasy",medium:"bestTimeMedium",hard:"bestTimeHard"}[state.difficulty];if(!d[k]||state.elapsedSeconds<d[k])d[k]=state.elapsedSeconds;d.lastPlayed=Date.now();return d})}catch(e){console.warn(e)}}
async function startNewGame(d){closeModal();stopTimer();loading.classList.add("show");await new Promise(r=>setTimeout(r,60));try{let g=generatePuzzle(d);state={...blank(),puzzle:g.puzzle,solution:g.solution,currentBoard:g.puzzle.map(x=>[...x]),difficulty:d,isRunning:true,sessionId:"session_"+Date.now()+"_"+Math.random().toString(36).slice(2,7)};showScreen("game");renderBoard();ui();saveGame();startTimer();if(fb)db.ref("sudokuPlayers/"+pid()+"/gamesPlayed").transaction(x=>(x||0)+1)}finally{loading.classList.remove("show")}}
function goHome(){stopTimer();if(state.puzzle.length&&!state.completed){state.isRunning=false;saveGame()}showScreen("home");homeUI()}
function homeUI(){let n=localStorage.getItem(NAME);$("greet").textContent=n?`Hai, ${n}! Bersedia untuk cabaran? 🚀`:"";let s=saved();$("resume").classList.toggle("hidden",!(s&&!s.completed))}
function toastMsg(m){let t=$("toast");t.textContent=m;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2200)}
function ensureAudio(){if(!soundOn)return null;try{if(!audio)audio=new(window.AudioContext||window.webkitAudioContext)();if(audio.state==="suspended")audio.resume();return audio}catch{return null}}
function tone(f,d=.08,type="sine",vol=.04,delay=0){let a=ensureAudio();if(!a)return;let o=a.createOscillator(),g=a.createGain(),s=a.currentTime+delay;o.type=type;o.frequency.value=f;g.gain.setValueAtTime(.0001,s);g.gain.exponentialRampToValueAtTime(vol,s+.01);g.gain.exponentialRampToValueAtTime(.0001,s+d);o.connect(g);g.connect(a.destination);o.start(s);o.stop(s+d+.02)}
function play(t){if(!soundOn)return;if(t==="click")tone(520);if(t==="select")tone(660,.05,"sine",.025);if(t==="number"){tone(620);tone(820,.08,"triangle",.03,.06)}if(t==="wrong"){tone(180,.18,"sawtooth",.035);tone(140,.2,"sawtooth",.025,.12)}if(t==="hint"){tone(600,.1);tone(800,.1,"sine",.03,.09);tone(1000,.15,"sine",.03,.18)}if(t==="win"){tone(523,.18,"triangle",.05);tone(659,.18,"triangle",.05,.16);tone(784,.18,"triangle",.05,.32);tone(1046,.35,"triangle",.05,.48)}}
function confetti(){let colors=["#5b5ff5","#ffd84d","#55dfbd","#ff5d73","#3aa9ff","#9c6cff"];for(let i=0;i<(innerWidth<600?70:120);i++){let p=document.createElement("div");p.className="confetti";p.style.left=Math.random()*100+"vw";p.style.background=colors[Math.floor(Math.random()*colors.length)];p.style.setProperty("--d",(Math.random()*240-120)+"px");p.style.animationDuration=(2.4+Math.random()*2.4)+"s";p.style.animationDelay=Math.random()*.8+"s";document.body.appendChild(p);setTimeout(()=>p.remove(),6000)}}
document.querySelectorAll(".level").forEach(b=>b.onclick=()=>{ensureAudio();let d=b.dataset.d;if(!localStorage.getItem(NAME)){selectedPending=d;$("playerModal").classList.add("show");$("playerName").focus()}else startNewGame(d)});
document.querySelectorAll("[data-n]").forEach(b=>b.onclick=()=>enterNumber(+b.dataset.n));
$("erase").onclick=eraseNumber;$("hint").onclick=useHint;$("pause").onclick=pauseGame;$("homeBtn").onclick=()=>{state.isPaused=true;board.classList.add("blurred");saveGame();modal("🏠","Keluar dari permainan?","Progress permainan semasa akan disimpan.",[{text:"KELUAR",cls:"primary",fn:()=>{closeModal();state.isPaused=false;board.classList.remove("blurred");goHome()}},{text:"TERUSKAN BERMAIN",cls:"soft",fn:()=>{closeModal();state.isPaused=false;board.classList.remove("blurred")}}])};
$("newGame").onclick=()=>modal("🔄","Mulakan permainan baru?","Puzzle semasa akan digantikan.",[{text:"YA, MULAKAN",cls:"primary",fn:()=>startNewGame(state.difficulty)},{text:"BATAL",cls:"soft",fn:closeModal}]);
$("sound").onclick=()=>{soundOn=!soundOn;localStorage.setItem(SOUND,soundOn?"on":"off");ui();if(soundOn)play("click")};
$("fun").onclick=()=>location.href=HOME_URL;$("resume").onclick=loadGame;
$("savePlayer").onclick=()=>{let n=$("playerName").value.trim();if(n.length<2)return toastMsg("Masukkan nama sekurang-kurangnya 2 aksara.");localStorage.setItem(NAME,n);$("playerModal").classList.remove("show");homeUI();savePlayerFB();if(selectedPending){let d=selectedPending;selectedPending=null;startNewGame(d)}};
document.addEventListener("keydown",e=>{if(!game.classList.contains("active")||overlay.classList.contains("show"))return;if(/^[1-9]$/.test(e.key))enterNumber(+e.key);else if(e.key==="Backspace"||e.key==="Delete")eraseNumber();else if(e.key==="ArrowUp")move(-1,0);else if(e.key==="ArrowDown")move(1,0);else if(e.key==="ArrowLeft")move(0,-1);else if(e.key==="ArrowRight")move(0,1)});
window.addEventListener("beforeunload",saveGame);
(function init(){pid();homeUI();ui();showScreen("home");if(!localStorage.getItem(NAME))$("playerModal").classList.add("show");else{savePlayerFB();let s=saved();if(s&&!s.completed)setTimeout(()=>modal("🧩","Sambung permainan sebelum ini?",`Cabaran ${labels[s.difficulty]} kamu masih belum selesai.`,[{text:"SAMBUNG",cls:"primary",fn:loadGame},{text:"MULA BARU",cls:"yellow",fn:()=>{closeModal();clearGame()}}]),350)}})();
</script>
</body>
</html>
